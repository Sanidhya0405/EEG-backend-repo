services:
  - type: web
    name: eeg-backend
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn api.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: CORS_ORIGINS
        value: https://eeg-new.vercel.app
      - key: PYTHON_VERSION
        value: 3.11.0
