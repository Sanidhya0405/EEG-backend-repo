version: '3.8'

services:
  # MySQL Database
  mysql:
    image: mysql:8.0
    container_name: eeg-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-rootpassword}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-eeg_biometric}
      MYSQL_USER: ${MYSQL_USER:-eeg_user}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-5911}
    volumes:
      - mysql_data:/var/lib/mysql
      - ./setup_mysql.sql:/docker-entrypoint-initdb.d/init.sql:ro
    ports:
      - "${MYSQL_PORT:-3306}:3306"
    networks:
      - eeg-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Backend API
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: eeg-backend
    restart: unless-stopped
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    environment:
      - DB_HOST=mysql
      - DB_USER=${MYSQL_USER:-eeg_user}
      - DB_PASSWORD=${MYSQL_PASSWORD:-5911}
      - DB_NAME=${MYSQL_DATABASE:-eeg_biometric}
    depends_on:
      mysql:
        condition: service_healthy
    volumes:
      - ./assets:/app/assets
      - ./data:/app/data:ro
    networks:
      - eeg-network
    healthcheck:
      test: ["CMD", "python", "-c", "import requests; requests.get('http://localhost:8000/api/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  # Frontend
  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: eeg-frontend
    restart: unless-stopped
    ports:
      - "${FRONTEND_PORT:-80}:80"
    depends_on:
      - backend
    networks:
      - eeg-network
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost/"]
      interval: 30s
      timeout: 3s
      retries: 3

volumes:
  mysql_data:
    driver: local

networks:
  eeg-network:
    driver: bridge
